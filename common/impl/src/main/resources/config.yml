# Whether to check for updates on reload and server startup
check-updates-on-reload: true
# Set to 'false' to disable all download features of PluginUpdater (May require restart)
allow-downloads: true

# To learn how to configure plugins that require different sources check out the wiki: https://github.com/OakLoaf/PluginUpdater/wiki/PluginUpdater-Plugin
plugins:
  PluginUpdater:
    source: modrinth
    modrinth-project-id: "IBSpJfbm"
    channels: release
  ExamplePlugin:
    enabled: false

messages:
  unchecked-color: "<dark_gray>"
  update-available-color: "<#ffda54>"
  major-update-available-color: "<#ff6969>"
  update-prepared-color: "<#ffda54>"
  latest-version-color: "<#b7faa2>"
  updates-available: "<#e0c01b>%amount% <#ffe27a>updates are available, type <#e0c01b>'%updates_command%' <#ffe27a>for more information!"
